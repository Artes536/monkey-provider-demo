<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; }
        h2 { color: var(--tg-theme-link-color); }
    </style>
</head>
<body>
<h2>MonkeyProvider 🐵</h2>
<div class="card">
    <p>Номер договора: <b>KZ-88421</b></p>
    <p>Ваш баланс: <span style="color: #4caf50; font-weight: bold;">4 500 ₸</span></p>
    <p>Тариф: <b>Ultra Fiber 100 Mbps</b></p>
</div>
<button class="btn" onclick="tg.close()">Вернуться в чат</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран
</script>
</body>
</html>
